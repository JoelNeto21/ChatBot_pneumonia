<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B4B" /> 
      <stop offset="100%" stop-color="#0F172A" /> 
    </linearGradient>
    
    <linearGradient id="gradLeft" x1="30" y1="30" x2="60" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" /> 
      <stop offset="100%" stop-color="#3B82F6" /> 
    </linearGradient>
    
    <linearGradient id="gradRight" x1="68" y1="30" x2="98" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" /> 
      <stop offset="100%" stop-color="#4F46E5" /> 
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="128" height="128" rx="28" fill="url(#bg)" />
  
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2" />

  <g filter="url(#glow)">
    <path d="M 60 32 C 30 32 20 60 28 92 C 32 104 48 104 54 88 C 60 72 60 48 60 32 Z" fill="url(#gradLeft)" opacity="0.9"/>
    <path d="M 68 32 C 98 32 108 60 100 92 C 96 104 80 104 74 88 C 68 72 68 48 68 32 Z" fill="url(#gradRight)" opacity="0.9"/>
  </g>
  
  <circle cx="64" cy="48" r="3.5" fill="#FFFFFF" />
  <circle cx="64" cy="62" r="3.5" fill="#FFFFFF" opacity="0.6" />
  <circle cx="64" cy="76" r="3.5" fill="#FFFFFF" opacity="0.3" />
</svg>
